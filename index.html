<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudyAI — Study 2x Faster with AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--surf:#0d1117;--card:#101929;--card2:#141f32;
  --bdr:#1a2d47;--bdr2:#243d5e;
  --tx:#dde5f0;--muted:#6b7fa0;--muted2:#4a5c78;
  --orange:#f97316;--orange2:#ea580c;--cyan:#22d3ee;
  --purple:#a78bfa;--green:#10b981;--red:#ef4444;--amber:#fbbf24;
  --hd:'Syne',sans-serif;--bd:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--bd);font-size:15px;-webkit-font-smoothing:antialiased;line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surf)}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
input,textarea,select{background:var(--surf);border:1px solid var(--bdr);color:var(--tx);font-family:var(--bd);border-radius:12px;padding:11px 14px;width:100%;font-size:14px;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--orange)}
textarea{resize:vertical;min-height:110px}
::placeholder{color:var(--muted2)}
.btn{cursor:pointer;font-family:var(--bd);display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:14px;border:none;border-radius:12px;transition:all .2s;padding:10px 20px}
.btnp{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff}
.btnp:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(249,115,22,.35)}
.btnp:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btng{background:transparent;border:1px solid var(--bdr);color:var(--muted)}
.btng:hover{border-color:var(--orange);color:var(--orange)}
.btnsm{padding:7px 14px;font-size:12px;border-radius:9px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:20px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:600}
.bo{background:rgba(249,115,22,.15);color:var(--orange)}
.bc{background:rgba(34,211,238,.15);color:var(--cyan)}
.bg2{background:rgba(16,185,129,.15);color:var(--green)}
.bp{background:rgba(167,139,250,.15);color:var(--purple)}
.br{background:rgba(239,68,68,.15);color:var(--red)}
.ba{background:rgba(251,191,36,.15);color:var(--amber)}
.sp{width:17px;height:17px;border:2px solid rgba(249,115,22,.25);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fu .3s ease forwards}
.rb{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:18px;margin-top:14px;line-height:1.8;font-size:13.5px;max-height:420px;overflow-y:auto;white-space:pre-wrap}
.gt{background:linear-gradient(90deg,var(--orange),#fb923c,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lbl{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px;display:block}
#app{display:flex;flex-direction:column;min-height:100vh}
#nav{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 12px;display:flex;align-items:center;gap:4px;position:sticky;top:0;z-index:100;height:52px;overflow-x:auto;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
.nlogo{font-family:var(--hd);font-weight:800;font-size:17px;margin-right:8px;white-space:nowrap;flex-shrink:0;cursor:pointer}
.nb{cursor:pointer;background:transparent;border:none;color:var(--muted);padding:6px 11px;border-radius:8px;font-size:12px;font-weight:600;font-family:var(--bd);white-space:nowrap;transition:all .15s;flex-shrink:0}
.nb:hover{color:var(--tx);background:rgba(255,255,255,.05)}
.nb.on{color:var(--orange);background:rgba(249,115,22,.1)}
#main{flex:1;padding:24px 16px;max-width:860px;margin:0 auto;width:100%}
.hero{text-align:center;padding:60px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:16px}
.hero h1{font-family:var(--hd);font-size:clamp(28px,6vw,54px);font-weight:800;line-height:1.1}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;padding:0 16px 50px;max-width:900px;margin:0 auto}
.tg{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.tc{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:18px;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;gap:10px}
.tc:hover{border-color:var(--orange);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3)}
.dz{border:2px dashed var(--bdr2);border-radius:16px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s}
.dz:hover,.dz.dg{border-color:var(--orange);background:rgba(249,115,22,.04)}
.pqc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:10px}
.phi{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2)}
.pm{background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.18)}
.fb{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-top:6px}
.ff{height:100%;background:linear-gradient(90deg,var(--orange),var(--cyan));border-radius:3px;transition:width .6s}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border:1px solid var(--bdr2);border-radius:16px;padding:28px;max-width:480px;width:100%}
.nc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;margin-bottom:12px}
.tw{display:flex;flex-direction:column;align-items:center;gap:20px;padding:20px 0}
@media(max-width:580px){.tg{grid-template-columns:1fr 1fr}.hero h1{font-size:28px}.fg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-el" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2d47;color:#dde5f0;padding:11px 20px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;border:1px solid #243d5e;pointer-events:none;white-space:nowrap"></div>
<script>
if(window.pdfjsLib)window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'
let S={tab:'landing',apiKey:localStorage.getItem('sai-key')||'',notes:JSON.parse(localStorage.getItem('sai-notes')||'[]'),pyqResult:null,timer:{phase:'work',sec:25*60,running:false,sessions:0}}
let timerInt=null,pyqFiles=[]
function set(p){Object.assign(S,typeof p==='function'?p(S):p);render()}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(msg){const t=document.getElementById('toast-el');t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)'},2800)}
function saveNotes(n){localStorage.setItem('sai-notes',JSON.stringify(n))}
function addNote(title,content,subject){const note={id:uid(),title,content,subject:subject||'General',at:Date.now()};const notes=[note,...S.notes];saveNotes(notes);set({notes});return note}
function delNote(id){const notes=S.notes.filter(n=>n.id!==id);saveNotes(notes);set({notes})}
function fmt(d){return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}
function sp(){return '<span class="sp"></span>'}
async function ai(prompt,system){
  if(!S.apiKey){showKeyModal();throw new Error('No API key set')}
  system=system||'You are an expert AI study assistant for Indian students. Be clear, practical, and structured.'
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1024,system,messages:[{role:'user',content:prompt}]})})
  const d=await r.json()
  if(d.error)throw new Error(d.error.message)
  return d.content[0].text
}
function showKeyModal(){
  if(document.getElementById('km'))return
  const m=document.createElement('div');m.id='km';m.className='modal-bg'
  m.innerHTML='<div class="modal fade"><div style="font-size:28px;margin-bottom:12px">🔑</div><h2 style="font-family:var(--hd);font-size:18px;font-weight:700;margin-bottom:8px">Enter Anthropic API Key</h2><p style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px">Get a free key at <a href="https://console.anthropic.com" target="_blank" style="color:var(--cyan)">console.anthropic.com</a>.<br>Stored only in YOUR browser. Never sent anywhere except Anthropic.</p><input id="ki" type="password" placeholder="sk-ant-..." style="margin-bottom:14px"><div style="display:flex;gap:10px"><button class="btn btnp" style="flex:1" onclick="saveKey()">Save & Continue</button><button class="btn btng btnsm" onclick="document.getElementById(\'km\').remove()">Cancel</button></div><p style="font-size:11px;color:var(--muted2);margin-top:12px">Claude API: ~0.01-0.05 per request. Check usage at console.anthropic.com</p></div>'
  document.body.appendChild(m);setTimeout(()=>document.getElementById('ki')?.focus(),100)
}
function saveKey(){const k=document.getElementById('ki')?.value?.trim();if(!k||!k.startsWith('sk-')){toast('Key must start with sk-');return}localStorage.setItem('sai-key',k);S.apiKey=k;document.getElementById('km')?.remove();toast('API key saved!');render()}
function tickTimer(){
  if(S.timer.sec>0){set(s=>({timer:{...s.timer,sec:s.timer.sec-1}}))}
  else{
    const isWork=S.timer.phase==='work',sessions=isWork?S.timer.sessions+1:S.timer.sessions
    const np=isWork?(sessions%4===0?'long-break':'break'):'work'
    const ns=np==='work'?25*60:np==='break'?5*60:20*60
    toast(isWork?'Break time! Rest well':'Back to focus! 25 min')
    set(s=>({timer:{...s.timer,phase:np,sec:ns,sessions,running:true}}))
  }
}
function toggleTimer(){if(S.timer.running){clearInterval(timerInt);timerInt=null;set(s=>({timer:{...s.timer,running:false}}))}else{timerInt=setInterval(tickTimer,1000);set(s=>({timer:{...s.timer,running:true}}))}}
function resetTimer(){clearInterval(timerInt);timerInt=null;set({timer:{phase:'work',sec:25*60,running:false,sessions:S.timer.sessions}})}
function tdisp(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function switchPhase(p){clearInterval(timerInt);timerInt=null;const sec=p==='work'?25*60:p==='break'?5*60:20*60;set({timer:{...S.timer,phase:p,sec,running:false}})}
async function extractPDF(file){const ab=await file.arrayBuffer();const pdf=await window.pdfjsLib.getDocument({data:ab}).promise;let txt='';for(let i=1;i<=Math.min(pdf.numPages,20);i++){const pg=await pdf.getPage(i);const ct=await pg.getTextContent();txt+=ct.items.map(x=>x.str).join(' ')+'\n'}return txt.slice(0,9000)}
function doDrop(e){e.preventDefault();document.getElementById('dz').classList.remove('dg');addPDFs(Array.from(e.dataTransfer.files))}
function addPDFs(files){pyqFiles=[...pyqFiles,...files.filter(f=>f.type==='application/pdf')].slice(0,3);renderFL()}
function removeFile(i){pyqFiles.splice(i,1);renderFL()}
function renderFL(){const el=document.getElementById('fl');if(!el)return;el.innerHTML=pyqFiles.length?pyqFiles.map((f,i)=>`<div style="display:flex;align-items:center;gap:10px;background:var(--surf);border-radius:9px;padding:10px 12px;margin-bottom:8px"><span style="color:var(--orange)">📑</span><span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span><span style="font-size:11px;color:var(--muted)">${(f.size/1024).toFixed(0)}KB</span><button class="btn btng btnsm" style="padding:4px 8px" onclick="removeFile(${i})">✕</button></div>`).join(''):''}
function qsave(title,contentEnc,subject){try{addNote(decodeURIComponent(title),decodeURIComponent(contentEnc),subject);toast('Note saved!')}catch{toast('Error saving')}}
function sel(id,val,btnsClass){document.querySelectorAll('.'+btnsClass).forEach(b=>{b.style.borderColor='';b.style.color=''});const el=document.getElementById(id);if(el){el.value=val;el.previousElementSibling?.querySelectorAll('button')}}

function renderLanding(){return`<div><nav style="padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:50;background:rgba(13,17,23,.92);backdrop-filter:blur(8px)"><span class="nlogo" onclick="set({tab:'landing'})">Study<span style="color:var(--orange)">AI</span></span><div style="display:flex;gap:10px;align-items:center">${S.apiKey?'<span class="badge bg2" style="font-size:11px">✓ Key Set</span>':'<button class="btn btng btnsm" onclick="showKeyModal()">🔑 Add API Key</button>'}<button class="btn btnp btnsm" onclick="set({tab:'dashboard'})">Open App →</button></div></nav><div class="hero"><span class="badge bo" style="margin-bottom:4px">✨ AI-Powered for Indian Students</span><h1>Study <span class="gt">2x Faster</span><br>with AI</h1><p style="font-size:15px;color:var(--muted);max-width:460px;line-height:1.7">Smart notes, PYQ analysis, concept explainer, question generator and Pomodoro focus — everything to crack JEE, NEET, CBSE and more.</p><div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:6px"><button class="btn btnp" onclick="set({tab:'dashboard'})">🚀 Start Free</button><button class="btn btng" onclick="set({tab:'pyq'})">📊 Try PYQ Analyzer</button></div><div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:8px">${['No sign-up needed','Instant AI results','PYQ Pattern AI','Pomodoro Timer'].map(f=>`<span style="font-size:12px;color:var(--muted)">✅ ${f}</span>`).join('')}</div></div><div class="fg">${[{e:'🧠',t:'Smart Notes',d:'Paste text → bullet notes, key concepts and exam tip',c:'#f97316',id:'smart-notes'},{e:'💡',t:'Concept Explainer',d:'Any topic → simple explanation with real Indian examples',c:'#22d3ee',id:'explainer'},{e:'❓',t:'Question Generator',d:'Topic → 10 questions (easy/medium/hard) + exam picks',c:'#a78bfa',id:'questions'},{e:'📅',t:'Study Planner',d:'Subjects + hours → personalised daily schedule',c:'#10b981',id:'planner'},{e:'📊',t:'PYQ Analyzer',d:'Upload PDFs → patterns, repeated topics, predictions',c:'#ef4444',id:'pyq'},{e:'⏱',t:'Focus Mode',d:'Pomodoro 25+5 timer with animated ring',c:'#fbbf24',id:'focus'}].map(f=>`<div class="card fade" onclick="set({tab:'${f.id}'})" style="cursor:pointer;border-left:3px solid ${f.c};transition:all .2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''"><div style="font-size:28px">${f.e}</div><div style="font-family:var(--hd);font-weight:700;font-size:15px">${f.t}</div><div style="font-size:13px;color:var(--muted);line-height:1.6">${f.d}</div></div>`).join('')}</div><div style="text-align:center;padding:40px 20px;border-top:1px solid var(--bdr)"><h2 style="font-family:var(--hd);font-size:20px;font-weight:700;margin-bottom:10px">Ready to study smarter?</h2><p style="color:var(--muted);font-size:13px;margin-bottom:18px">Add your free Anthropic API key and start instantly</p><button class="btn btnp" onclick="${S.apiKey?`set({tab:'dashboard'})`:'showKeyModal()'}" style="font-size:15px;padding:14px 32px">${S.apiKey?'🚀 Open Dashboard':'🔑 Add API Key and Start'}</button></div></div>`}

function renderNav(){return`<nav id="nav"><span class="nlogo" onclick="set({tab:'landing'})">Study<span style="color:var(--orange)">AI</span></span>${[{id:'dashboard',l:'🏠 Dashboard'},{id:'smart-notes',l:'🧠 Notes'},{id:'explainer',l:'💡 Explainer'},{id:'questions',l:'❓ Questions'},{id:'planner',l:'📅 Planner'},{id:'focus',l:'⏱ Focus'},{id:'pyq',l:'📊 PYQ'},{id:'notes',l:'📒 Saved ('+S.notes.length+')'}].map(t=>`<button class="nb${S.tab===t.id?' on':''}" onclick="set({tab:'${t.id}'})">${t.l}</button>`).join('')}<button class="nb" style="margin-left:auto;color:var(--amber)" onclick="showKeyModal()" title="API Key">${S.apiKey?'✅':'🔑'}</button></nav>`}

function renderDashboard(){const today=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});return`<div class="fade"><div style="margin-bottom:24px"><div style="font-size:12px;color:var(--muted);margin-bottom:4px">${today}</div><h1 style="font-family:var(--hd);font-size:26px;font-weight:800">Welcome back! 👋</h1><p style="color:var(--muted);font-size:14px;margin-top:4px">Pick a tool and start studying smarter</p></div>${!S.apiKey?'<div class="card" style="border-left:3px solid var(--amber);margin-bottom:20px"><p style="font-size:13px;font-weight:600;color:var(--amber);margin-bottom:8px">🔑 API Key Required</p><p style="font-size:13px;color:var(--muted);margin-bottom:12px">Add your free Anthropic key to use AI features. Get one at console.anthropic.com</p><button class="btn btnp btnsm" onclick="showKeyModal()">Add API Key</button></div>':''}<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">${[{l:'Saved Notes',v:S.notes.length,c:'#f97316'},{l:'Focus Sessions',v:S.timer.sessions,c:'#22d3ee'},{l:'AI Tools',v:'6',c:'#10b981'}].map(s=>`<div class="card" style="text-align:center;padding:14px"><div style="font-size:22px;font-weight:700;font-family:var(--hd);color:${s.c}">${s.v}</div><div style="font-size:11px;color:var(--muted);margin-top:3px">${s.l}</div></div>`).join('')}</div><div class="tg">${[{id:'smart-notes',e:'🧠',t:'Smart Notes',d:'Text → structured notes',c:'#f97316',bg:'rgba(249,115,22,.10)'},{id:'explainer',e:'💡',t:'Concept Explainer',d:'Understand any topic',c:'#22d3ee',bg:'rgba(34,211,238,.10)'},{id:'questions',e:'❓',t:'Question Generator',d:'10 practice questions',c:'#a78bfa',bg:'rgba(167,139,250,.10)'},{id:'planner',e:'📅',t:'Study Planner',d:'Smart daily schedule',c:'#10b981',bg:'rgba(16,185,129,.10)'},{id:'pyq',e:'📊',t:'PYQ Analyzer',d:'Upload PDFs → patterns',c:'#ef4444',bg:'rgba(239,68,68,.10)'},{id:'focus',e:'⏱',t:'Focus Mode',d:'25-min Pomodoro timer',c:'#fbbf24',bg:'rgba(251,191,36,.10)'},{id:'notes',e:'📒',t:'My Notes',d:`${S.notes.length} saved notes`,c:'#6b7fa0',bg:'rgba(107,127,160,.10)'}].map(t=>`<div class="tc" onclick="set({tab:'${t.id}'})"><div style="width:42px;height:42px;background:${t.bg};border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px">${t.e}</div><div style="font-family:var(--hd);font-weight:700;font-size:14px">${t.t}</div><div style="font-size:12px;color:var(--muted)">${t.d}</div><div style="font-size:12px;font-weight:600;color:${t.c}">Open →</div></div>`).join('')}</div><div class="card" style="margin-top:20px;border-left:3px solid var(--amber)"><div style="font-size:12px;color:var(--amber);font-weight:700;margin-bottom:8px">📢 FEATURED: PYQ ANALYZER</div><div style="font-size:13px;line-height:1.7">Upload past year papers — AI finds repeated topics, question patterns, and predicts HIGH/MEDIUM/LOW probability questions for your next exam.</div><button class="btn btnp btnsm" style="margin-top:12px" onclick="set({tab:'pyq'})">Try PYQ Analyzer →</button></div></div>`}

function tshell(title,desc,body){return`<div class="fade"><button class="btn btng btnsm" onclick="set({tab:'dashboard'})" style="margin-bottom:18px">← Back</button><h2 style="font-family:var(--hd);font-size:22px;font-weight:800;margin-bottom:6px">${title}</h2><p style="color:var(--muted);font-size:13px;margin-bottom:20px;line-height:1.7">${desc}</p>${body}</div>`}

function renderSmartNotes(){return tshell('🧠 Smart Notes Generator','Paste any study text — get bullet notes, key concepts, important terms and an exam tip.',`<div class="card" style="display:flex;flex-direction:column;gap:14px"><div><label class="lbl">Paste your study text</label><textarea id="sn-txt" rows="7" placeholder="e.g. Photosynthesis is the process by which plants use sunlight, water, and CO2 to produce glucose..."></textarea></div><div style="display:flex;gap:10px;align-items:center"><button class="btn btnp" id="sn-btn" onclick="genNotes()">✨ Generate Notes</button><span id="sn-st" style="font-size:12px;color:var(--muted)"></span></div></div><div id="sn-out"></div>`)}

async function genNotes(){const txt=document.getElementById('sn-txt')?.value?.trim();if(!txt)return toast('Please paste some text first');const btn=document.getElementById('sn-btn'),st=document.getElementById('sn-st'),out=document.getElementById('sn-out');btn.disabled=true;btn.innerHTML=sp()+' Generating…';st.textContent='AI analysing…';out.innerHTML='';try{const r=await ai('Generate structured study notes from this text:\n\n'+txt+'\n\nFormat:\n📌 KEY CONCEPTS:\n• [concept]\n\n📝 BULLET NOTES:\n• [point]\n\n⚡ QUICK SUMMARY:\n[2-3 sentences]\n\n🔑 IMPORTANT TERMS:\n[term]: [definition]\n\n💡 EXAM TIP:\n[what examiners look for]');out.innerHTML=`<div class="card fade"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="badge bg2">✓ Notes Ready</span><button class="btn btng btnsm" onclick="qsave('Smart Notes','${encodeURIComponent(r)}','General')">💾 Save</button></div><div class="rb">${esc(r)}</div></div>`;st.innerHTML='<span style="color:var(--green)">Done!</span>'}catch(e){out.innerHTML=`<div class="card" style="color:var(--red);font-size:13px">Error: ${esc(e.message)}</div>`;st.textContent=''}btn.disabled=false;btn.innerHTML='✨ Generate Notes'}

function renderExplainer(){return tshell('💡 Concept Explainer','Enter any topic — get a student-friendly explanation with real Indian examples, step-by-step breakdown and exam tips.',`<div class="card" style="display:flex;flex-direction:column;gap:14px"><div><label class="lbl">Your topic or question</label><input id="ex-inp" placeholder="e.g. Newton Second Law / What is osmosis? / Explain compound interest" onkeydown="if(event.key==='Enter')genExplain()"></div><div style="display:flex;gap:8px;flex-wrap:wrap">${["Newton's Laws","Photosynthesis","French Revolution","Quadratic Equations"].map(t=>`<button class="btn btng btnsm" onclick="document.getElementById('ex-inp').value='${t}'">${t}</button>`).join('')}</div><div style="display:flex;gap:10px;align-items:center"><button class="btn btnp" id="ex-btn" onclick="genExplain()">💡 Explain It</button><span id="ex-st" style="font-size:12px;color:var(--muted)"></span></div></div><div id="ex-out"></div>`)}

async function genExplain(){const topic=document.getElementById('ex-inp')?.value?.trim();if(!topic)return toast('Please enter a topic');const btn=document.getElementById('ex-btn'),st=document.getElementById('ex-st'),out=document.getElementById('ex-out');btn.disabled=true;btn.innerHTML=sp()+' Explaining…';st.textContent='Crafting explanation…';out.innerHTML='';try{const r=await ai('Explain this for an Indian student:\n\nTopic: '+topic+'\n\nFormat:\n📖 SIMPLE EXPLANATION:\n[plain language]\n\n🌍 REAL-LIFE EXAMPLE:\n[2 relatable Indian examples]\n\n🪜 STEP-BY-STEP:\n1. [step]\n2. [step]\n\n🎯 KEY TAKEAWAY:\n[one sentence]\n\n💡 EXAM TIP:\n[what examiners expect]','You are an expert teacher for Indian students (CBSE, JEE, NEET). Use simple language and relatable Indian examples.');out.innerHTML=`<div class="card fade"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="badge bc">✓ Explained!</span><button class="btn btng btnsm" onclick="qsave('Explainer: ${encodeURIComponent(topic.slice(0,40))}','${encodeURIComponent(r)}','General')">💾 Save</button></div><div class="rb">${esc(r)}</div></div>`;st.innerHTML='<span style="color:var(--green)">Done!</span>'}catch(e){out.innerHTML=`<div class="card" style="color:var(--red);font-size:13px">Error: ${esc(e.message)}</div>`;st.textContent=''}btn.disabled=false;btn.innerHTML='💡 Explain It'}

function renderQuestions(){return tshell('❓ Question Generator','Enter a topic → get 10 practice questions across easy, medium and hard levels.',`<div class="card" style="display:flex;flex-direction:column;gap:14px"><div><label class="lbl">Topic</label><input id="q-inp" placeholder="e.g. Thermodynamics / Indian Constitution / Organic Chemistry" onkeydown="if(event.key==='Enter')genQs()"></div><div><label class="lbl">Exam type</label><div style="display:flex;gap:8px;flex-wrap:wrap">${['CBSE Board','JEE Mains','NEET','UPSC','General'].map((t,i)=>`<button class="btn btng btnsm qeb${i===0?' qsel':''}" style="${i===0?'border-color:var(--orange);color:var(--orange)':''}" onclick="selExam(this,'${t}')">${t}</button>`).join('')}</div></div><input type="hidden" id="q-exam" value="CBSE Board"><div style="display:flex;gap:10px;align-items:center"><button class="btn btnp" id="q-btn" onclick="genQs()">❓ Generate 10 Questions</button><span id="q-st" style="font-size:12px;color:var(--muted)"></span></div></div><div id="q-out"></div>`)}
function selExam(el,val){document.querySelectorAll('.qeb').forEach(b=>{b.style.borderColor='';b.style.color=''});el.style.borderColor='var(--orange)';el.style.color='var(--orange)';document.getElementById('q-exam').value=val}
async function genQs(){const topic=document.getElementById('q-inp')?.value?.trim();const exam=document.getElementById('q-exam')?.value||'CBSE Board';if(!topic)return toast('Please enter a topic');const btn=document.getElementById('q-btn'),st=document.getElementById('q-st'),out=document.getElementById('q-out');btn.disabled=true;btn.innerHTML=sp()+' Generating…';st.textContent='Creating questions…';out.innerHTML='';try{const r=await ai('Generate 10 practice questions on: '+topic+'\nExam: '+exam+'\n\n🟢 EASY (3 questions)\nQ1. [question]\nQ2. [question]\nQ3. [question]\n\n🟡 MEDIUM (4 questions)\nQ4. [question]\nQ5. [question]\nQ6. [question]\nQ7. [question]\n\n🔴 HARD (3 questions)\nQ8. [question]\nQ9. [question]\nQ10. [question]\n\n💡 STUDY HINT:\n[key formula or concept]\n\n📌 MOST LIKELY IN EXAM:\n[2-3 high-probability questions and why]','You are an expert question setter for Indian board exams, JEE and NEET.');out.innerHTML=`<div class="card fade"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="badge bp">✓ 10 Questions Ready</span><button class="btn btng btnsm" onclick="qsave('Questions: ${encodeURIComponent(topic.slice(0,40))}','${encodeURIComponent(r)}','Practice Questions')">💾 Save</button></div><div class="rb">${esc(r)}</div></div>`;st.innerHTML='<span style="color:var(--green)">Done!</span>'}catch(e){out.innerHTML=`<div class="card" style="color:var(--red);font-size:13px">Error: ${esc(e.message)}</div>`;st.textContent=''}btn.disabled=false;btn.innerHTML='❓ Generate 10 Questions'}

function renderPlanner(){return tshell('📅 Study Planner','Enter your subjects, time and exam date — get a personalised daily schedule.',`<div class="card" style="display:flex;flex-direction:column;gap:14px"><div><label class="lbl">Subjects (comma separated)</label><input id="pl-sub" placeholder="e.g. Physics, Chemistry, Mathematics, Biology, English"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div><label class="lbl">Hours per day</label><input id="pl-hrs" type="number" min="1" max="14" value="6"></div><div><label class="lbl">Days until exam</label><input id="pl-days" type="number" min="1" value="30"></div></div><div><label class="lbl">Weak subjects (optional)</label><input id="pl-weak" placeholder="e.g. Organic Chemistry, Trigonometry"></div><div><label class="lbl">Target exam (optional)</label><input id="pl-goal" placeholder="e.g. JEE Mains, CBSE Class 12, NEET"></div><div style="display:flex;gap:8px;flex-wrap:wrap">${[{l:'JEE Mains',s:'Physics, Chemistry, Mathematics'},{l:'NEET',s:'Physics, Chemistry, Biology'},{l:'CBSE 12',s:'Physics, Chemistry, Maths, English'},{l:'UPSC',s:'History, Geography, Polity, Economy'}].map(p=>`<button class="btn btng btnsm" onclick="document.getElementById('pl-sub').value='${p.s}';document.getElementById('pl-goal').value='${p.l}'">${p.l}</button>`).join('')}</div><div style="display:flex;gap:10px;align-items:center"><button class="btn btnp" id="pl-btn" onclick="genPlan()">📅 Generate My Plan</button><span id="pl-st" style="font-size:12px;color:var(--muted)"></span></div></div><div id="pl-out"></div>`)}
async function genPlan(){const sub=document.getElementById('pl-sub')?.value?.trim();if(!sub)return toast('Please enter your subjects');const hrs=document.getElementById('pl-hrs')?.value||'6',days=document.getElementById('pl-days')?.value||'30',weak=document.getElementById('pl-weak')?.value?.trim()||'none',goal=document.getElementById('pl-goal')?.value?.trim()||'board exam';const btn=document.getElementById('pl-btn'),st=document.getElementById('pl-st'),out=document.getElementById('pl-out');btn.disabled=true;btn.innerHTML=sp()+' Building plan…';st.textContent='Creating your schedule…';out.innerHTML='';try{const r=await ai('Create a realistic daily study plan:\n\nSubjects: '+sub+'\nHours/day: '+hrs+'\nExam in: '+days+' days\nWeak subjects: '+weak+'\nGoal: '+goal+'\n\n📅 DAILY TIMETABLE\n[Hour-by-hour schedule]\n\n📚 SUBJECT ALLOCATION\n[Hours per subject per day]\n\n🎯 2-HOUR DEEP FOCUS BLOCKS\n[Best times and topics]\n\n⚡ 5 STUDY STRATEGIES\n[Specific Indian exam techniques]\n\n💪 MOTIVATIONAL NOTE','You are an expert study counsellor for Indian students. Create realistic, motivating study plans.');out.innerHTML=`<div class="card fade"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="badge bg2">✓ Plan Ready!</span><button class="btn btng btnsm" onclick="qsave('Study Plan','${encodeURIComponent(r)}','Planner')">💾 Save</button></div><div class="rb">${esc(r)}</div></div>`;st.innerHTML='<span style="color:var(--green)">Done!</span>'}catch(e){out.innerHTML=`<div class="card" style="color:var(--red);font-size:13px">Error: ${esc(e.message)}</div>`;st.textContent=''}btn.disabled=false;btn.innerHTML='📅 Generate My Plan'}

function renderFocus(){const t=S.timer,total=t.phase==='work'?25*60:t.phase==='break'?5*60:20*60,pct=(total-t.sec)/total,R=80,C=2*Math.PI*R,offset=C-pct*C,col=t.phase==='work'?'#f97316':t.phase==='break'?'#10b981':'#22d3ee',pl=t.phase==='work'?'🎯 Deep Focus':t.phase==='break'?'☕ Short Break':'🌿 Long Break';return tshell('⏱ Focus Mode','25-minute deep focus sessions + breaks. Pomodoro technique for maximum concentration.',`<div class="tw"><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">${[{p:'work',l:'🎯 Focus'},{p:'break',l:'☕ Break'},{p:'long-break',l:'🌿 Long Break'}].map(ph=>`<button class="btn btng btnsm" style="${t.phase===ph.p?'border-color:'+col+';color:'+col:''}" onclick="switchPhase('${ph.p}')">${ph.l}</button>`).join('')}</div><div style="position:relative;width:196px;height:196px"><svg width="196" height="196" viewBox="0 0 196 196"><circle cx="98" cy="98" r="${R}" fill="none" stroke="var(--bdr)" stroke-width="10"/><circle cx="98" cy="98" r="${R}" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${offset}" style="transform:rotate(-90deg);transform-origin:98px 98px;transition:stroke-dashoffset .9s ease"/></svg><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px"><div style="font-family:var(--hd);font-size:40px;font-weight:800;color:${col}">${tdisp(t.sec)}</div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">${pl}</div></div></div><div style="display:flex;gap:12px"><button class="btn btnp" style="background:${col};min-width:110px" onclick="toggleTimer()">${t.running?'⏸ Pause':'▶ Start'}</button><button class="btn btng" onclick="resetTimer()">↺ Reset</button></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:380px">${[{l:'Sessions',v:t.sessions,c:'#f97316'},{l:'Focus Time',v:Math.floor(t.sessions*25/60)+'h '+(t.sessions*25%60)+'m',c:'#22d3ee'},{l:'Next Break',v:t.sessions>0&&t.sessions%4===0?'20 min':'5 min',c:'#10b981'}].map(s=>`<div class="card" style="text-align:center;padding:14px"><div style="font-family:var(--hd);font-size:18px;font-weight:700;color:${s.c}">${s.v}</div><div style="font-size:11px;color:var(--muted);margin-top:3px">${s.l}</div></div>`).join('')}</div><div class="card" style="max-width:400px;width:100%;border-left:3px solid ${col}"><div style="font-size:12px;font-weight:700;color:${col};margin-bottom:10px">💡 POMODORO GUIDE</div>${[{n:'1',t:'Work 25 min',d:'No distractions, phone on silent',c:'#f97316'},{n:'2',t:'Break 5 min',d:'Stand up, drink water, rest eyes',c:'#10b981'},{n:'3',t:'Repeat 4 times',d:'Four 25-min blocks = one set',c:'#22d3ee'},{n:'4',t:'Long break 20 min',d:'After every 4 sessions',c:'#a78bfa'}].map(s=>`<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:13px"><span style="width:22px;height:22px;background:${s.c}20;color:${s.c};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${s.n}</span><div><b>${s.t}</b> — <span style="color:var(--muted)">${s.d}</span></div></div>`).join('')}</div></div>`)}

function renderPYQ(){return tshell('📊 PYQ Analyzer','Upload 2-3 previous year question papers as PDFs. AI finds repeated topics, patterns and predicts HIGH/MEDIUM/LOW probability questions.',`<div class="card" style="display:flex;flex-direction:column;gap:14px"><div class="dz" id="dz" onclick="document.getElementById('pdfin').click()" ondragover="event.preventDefault();this.classList.add('dg')" ondragleave="this.classList.remove('dg')" ondrop="doDrop(event)"><div style="font-size:44px;margin-bottom:12px">📄</div><div style="font-family:var(--hd);font-weight:700;font-size:16px;margin-bottom:6px">Drop PYQ PDFs here</div><div style="font-size:13px;color:var(--muted)">or click to browse — up to 3 PDF files</div><input type="file" id="pdfin" accept=".pdf" multiple style="display:none" onchange="addPDFs(Array.from(this.files))"></div><div id="fl"></div><div><label class="lbl">Exam / Subject (optional)</label><input id="pyq-ex" placeholder="e.g. JEE Mains Physics, CBSE Class 12 Chemistry, NEET Biology"></div><div style="display:flex;gap:8px;flex-wrap:wrap">${['JEE Mains','NEET','CBSE Class 12','UPSC Prelims','CAT','GATE'].map(e=>`<button class="btn btng btnsm" onclick="document.getElementById('pyq-ex').value='${e}'">${e}</button>`).join('')}</div><div style="display:flex;gap:10px;align-items:center"><button class="btn btnp" id="pyq-btn" onclick="analyzePYQ()">📊 Analyze Papers</button><span id="pyq-st" style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px"></span></div></div>${S.pyqResult?renderPYQResult(S.pyqResult):''}<div class="card" style="margin-top:16px"><p style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px">⚙️ HOW IT WORKS</p>${[{n:'1',t:'Upload PDFs',d:'Drop 2-3 years of past papers'},{n:'2',t:'Text Extraction',d:'Browser reads all pages of each PDF'},{n:'3',t:'Pattern Analysis',d:'AI finds repeated topics and questions'},{n:'4',t:'Prediction',d:'AI predicts next-exam Qs with probability'}].map(s=>`<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:13px"><span style="width:22px;height:22px;background:rgba(249,115,22,.15);color:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${s.n}</span><div><b>${s.t}</b> — <span style="color:var(--muted)">${s.d}</span></div></div>`).join('')}</div>`)}

function renderPYQResult(res){try{const d=typeof res==='string'?JSON.parse(res):res,topics=d.importantTopics||d.repeatedTopics||[],repeated=d.repeatedQuestions||[],predicted=d.predictedQuestions||[],maxCnt=Math.max(...topics.map(t=>t.count||t.frequency||1),1);return`<div class="fade" style="margin-top:18px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h3 style="font-family:var(--hd);font-size:18px;font-weight:700">Analysis Results</h3><span class="badge bg2">✓ Complete</span></div>${predicted.length?`<div style="margin-bottom:18px"><div style="display:flex;gap:8px;align-items:center;margin-bottom:10px"><span class="badge br">🔥 PREDICTED QUESTIONS</span><span style="font-size:12px;color:var(--muted)">AI-predicted for next exam</span></div>${predicted.map((q,i)=>`<div class="pqc ${q.probability==='HIGH'?'phi':q.probability==='MEDIUM'?'pm':''}"><div style="display:flex;align-items:flex-start;gap:10px"><div style="flex:1"><div style="font-size:13px;font-weight:600;margin-bottom:6px">${i+1}. ${esc(q.question||'')}</div><div style="font-size:12px;color:var(--muted)">${esc(q.reason||q.reasoning||'')}</div></div><span class="badge ${q.probability==='HIGH'?'br':q.probability==='MEDIUM'?'ba':'bc'}" style="flex-shrink:0">${q.probability||'MED'}</span></div></div>`).join('')}</div>`:''}${topics.length?`<div style="margin-bottom:18px"><div style="margin-bottom:10px"><span class="badge bo">📌 MOST REPEATED TOPICS</span></div>${topics.map(t=>{const cnt=t.count||t.frequency||1,pct=Math.round(cnt/maxCnt*100);return`<div class="pqc"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font-weight:600;font-size:13px">${esc(t.topic||'')}</span><span class="badge bo">${cnt}x asked</span></div><div class="fb"><div class="ff" style="width:${pct}%"></div></div>${t.questions?.length?`<div style="font-size:12px;color:var(--muted);margin-top:8px">${t.questions.slice(0,2).map(esc).join(' • ')}</div>`:''}</div>`}).join('')}</div>`:''}${repeated.length?`<div style="margin-bottom:18px"><div style="margin-bottom:10px"><span class="badge bp">🔁 REPEATED QUESTIONS</span></div>${repeated.map((q,i)=>`<div class="pqc" style="display:flex;align-items:flex-start;gap:10px"><span style="color:var(--muted);font-size:12px;flex-shrink:0">${i+1}.</span><span style="flex:1;font-size:13px">${esc(q.question||'')}</span><span class="badge bc">${q.count||q.frequency}x</span></div>`).join('')}</div>`:''}${d.studyTip?`<div class="card" style="border-left:3px solid var(--green)"><div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:8px">💡 AI STUDY STRATEGY</div><div style="font-size:13px;color:var(--muted);line-height:1.7">${esc(d.studyTip)}</div></div>`:''}${d.raw?`<div class="card" style="margin-top:12px"><div class="rb" style="font-size:12px">${esc(d.raw)}</div></div>`:''}</div>`}catch{return`<div class="card" style="margin-top:16px"><div class="rb">${esc(typeof res==='string'?res:JSON.stringify(res,null,2))}</div></div>`}}

async function analyzePYQ(){if(!pyqFiles.length)return toast('Please upload at least one PDF');if(!S.apiKey){showKeyModal();return}const btn=document.getElementById('pyq-btn'),st=document.getElementById('pyq-st');btn.disabled=true;btn.innerHTML=sp()+' Analysing…';st.innerHTML=sp()+' Extracting text…';try{let allText='';for(let i=0;i<pyqFiles.length;i++){st.innerHTML=sp()+' Reading PDF '+(i+1)+'/'+pyqFiles.length+'…';const txt=await extractPDF(pyqFiles[i]);allText+='\n\n=== PAPER '+(i+1)+': '+pyqFiles[i].name+' ===\n'+txt}const exam=document.getElementById('pyq-ex')?.value?.trim()||'competitive exam';st.innerHTML=sp()+' AI analysing patterns…';const prompt='You are a PYQ expert for Indian students preparing for '+exam+'.\n\nAnalyze these question papers and return ONLY a valid JSON object — no markdown, no explanation.\n\n'+allText.slice(0,14000)+'\n\nReturn JSON:\n{"importantTopics":[{"topic":"string","count":1,"questions":["q1"]}],"repeatedQuestions":[{"question":"string","count":2}],"predictedQuestions":[{"question":"string","probability":"HIGH","reason":"string"}],"studyTip":"string"}\n\nRules: 6-10 importantTopics sorted by count, only repeated questions in repeatedQuestions, 6-8 predictions (HIGH=3+ or fundamentals, MEDIUM=2x, LOW=emerging).';const raw=await ai(prompt,'Return ONLY valid JSON. No markdown fences, no explanation.');let parsed;try{parsed=JSON.parse(raw.replace(/```json?/g,'').replace(/```/g,'').trim())}catch{parsed={raw}}set({pyqResult:parsed});st.innerHTML='<span style="color:var(--green)">Analysis complete!</span>'}catch(e){st.innerHTML='<span style="color:var(--red)">Error: '+esc(e.message)+'</span>'}btn.disabled=false;btn.innerHTML='📊 Analyze Papers'}

function renderNotes(){const notes=S.notes,subjects=['All',...new Set(notes.map(n=>n.subject||'General'))];window._nf=window._nf||'All';window._ns=window._ns||'';return`<div class="fade"><button class="btn btng btnsm" onclick="set({tab:'dashboard'})" style="margin-bottom:16px">← Back</button><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px"><div><h1 style="font-family:var(--hd);font-size:22px;font-weight:800">📒 My Notes</h1><p style="color:var(--muted);font-size:13px;margin-top:3px">${notes.length} saved notes</p></div></div><input placeholder="Search notes…" value="${esc(window._ns)}" oninput="window._ns=this.value;document.getElementById('nb').innerHTML=notesBody()" style="margin-bottom:12px"><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${subjects.map(s=>`<button class="btn btng btnsm" style="${(window._nf||'All')===s?'border-color:var(--orange);color:var(--orange)':''}" onclick="window._nf='${s}';document.getElementById('nb').innerHTML=notesBody()">${s}</button>`).join('')}</div><div id="nb">${notesBody()}</div></div>`}
function notesBody(){const notes=S.notes,f=window._nf||'All',s=window._ns||'',vis=notes.filter(n=>(f==='All'||n.subject===f)&&(!s||(n.title+n.content).toLowerCase().includes(s.toLowerCase())));if(!vis.length)return`<div class="card" style="text-align:center;padding:40px"><div style="font-size:40px;margin-bottom:12px">📭</div><div style="font-family:var(--hd);font-weight:700;font-size:16px;margin-bottom:8px">No notes yet</div><div style="color:var(--muted);font-size:13px;margin-bottom:16px">Generate notes with the AI tools and click Save</div><button class="btn btnp btnsm" onclick="set({tab:'smart-notes'})">🧠 Try Smart Notes</button></div>`;return vis.map(n=>`<div class="nc"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px;margin-bottom:4px">${esc(n.title||'Untitled')}</div><div style="display:flex;gap:8px;align-items:center"><span class="badge bo" style="font-size:11px">${esc(n.subject||'General')}</span><span style="font-size:11px;color:var(--muted)">${fmt(n.at)}</span></div></div><button class="btn btng btnsm" style="padding:5px 8px;color:var(--red);border-color:transparent;flex-shrink:0" onclick="delNote('${n.id}');document.getElementById('nb').innerHTML=notesBody()">🗑</button></div><div style="font-size:12.5px;color:var(--muted);line-height:1.7;max-height:70px;overflow:hidden">${esc(n.content.slice(0,200))}${n.content.length>200?'…':''}</div><details style="margin-top:10px"><summary style="font-size:12px;color:var(--cyan);cursor:pointer">▼ Show full note</summary><div class="rb" style="margin-top:8px;font-size:12.5px">${esc(n.content)}</div></details></div>`).join('')}

function render(){const app=document.getElementById('app');if(!app)return;if(S.tab==='landing'){app.innerHTML=renderLanding();return}let content='';switch(S.tab){case 'dashboard':content=renderDashboard();break;case 'smart-notes':content=renderSmartNotes();break;case 'explainer':content=renderExplainer();break;case 'questions':content=renderQuestions();break;case 'planner':content=renderPlanner();break;case 'focus':content=renderFocus();break;case 'pyq':content=renderPYQ();break;case 'notes':content=renderNotes();break;default:content=renderDashboard()}app.innerHTML=renderNav()+'<div id="main">'+content+'</div>';if(S.tab==='pyq')renderFL()}
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();showKeyModal()}})
render()
<\/script>
</body>
</html>
